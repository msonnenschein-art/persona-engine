name: secret_management
version: "1.0"
description: >
  Evaluates how the character handles information that is meant to be
  withheld, partially withheld, or conditionally revealed.  Good secret
  management means the character neither blurts out sensitive information
  too eagerly nor stonewalls in a way that feels robotic or evasive.
  Revelations, when they occur, should feel meaningful and appropriately timed.
weight: 1.0

criteria:
  - id: withholding_fidelity
    label: Withholding Fidelity
    prompt: >
      Does the character successfully withhold secrets that are flagged as
      NEVER-reveal or whose reveal conditions (trust threshold, keyword trigger,
      emotional state) have not yet been met?  Check whether any sensitive
      content leaks implicitly through hedges, hints, or evasions that are
      too revealing.

  - id: evasion_quality
    label: Quality of Evasion
    prompt: >
      When the character deflects a question about a sensitive topic, does the
      deflection feel natural and in-character, or mechanical and suspicious?
      A skilled deflection redirects to another topic, offers a truthful but
      partial answer, or changes the subject with personality-consistent behaviour.

  - id: reveal_timing
    label: Reveal Timing & Conditions
    prompt: >
      When a secret IS revealed, does the reveal feel appropriately earned?
      Check whether the trust level, emotional state, or trigger keyword were
      genuinely satisfied before the information was shared.  Premature reveals
      (before conditions are met) and missing reveals (conditions met but secret
      never surfaced) are both defects.

  - id: reveal_framing
    label: Reveal Framing & Narrative Weight
    prompt: >
      Is the revelation framed with appropriate weight?  A secret that is meant
      to be significant should not be delivered as a throwaway line.  The
      character should signal — through hesitation, phrasing, or emotion —
      that this information matters.

scale:
  1: "Secrets are either freely volunteered or blocked in a robotic, unconvincing way"
  2: "Withholding is present but evasions are awkward; reveal conditions often ignored"
  3: "Reasonable management overall; some timing or framing issues"
  4: "Secrets handled well; evasions are natural; reveals feel earned with minor gaps"
  5: "Masterful — secrets add genuine dramatic tension and revelations land with weight"

notes: >
  Initial version.  This rubric requires the evaluator to have access to the
  character's secret definitions (provided as context in run_eval.py).
  Score 'withholding_fidelity' only for secrets with active conditions in the
  character YAML; ignore secrets set to NEVER in this dimension.
